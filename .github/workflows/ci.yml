name: CI

# Runs on every branch push and PR (verifies ktlint + assembleDebug; build
# output is discarded). When a tag is pushed, additionally uploads the debug
# APK as a workflow artifact so it can be downloaded from the run page.
on:
  push:
    branches: ['**']
    tags: ['**']
  pull_request:
    branches: ['**']

permissions:
  contents: read

# Cancel previous in-flight runs for the same branch / PR so a quick succession
# of pushes doesn't queue redundant builds.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ktlint + assembleDebug
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-35 build-tools;35.0.0'

      - name: Install Gradle 8.10.2
        # We install Gradle manually rather than via `gradle/actions/setup-gradle`
        # because that action's "Provision Gradle" step on ubuntu-latest can
        # collide with the runner's pre-installed `/usr/bin/gradle`. The
        # Makefile's `make wrapper` target needs a `gradle` on PATH; this
        # gives it exactly that, at the pinned version, with no surprises.
        run: |
          set -euo pipefail
          curl -sSLo /tmp/gradle.zip \
            https://services.gradle.org/distributions/gradle-8.10.2-bin.zip
          sudo unzip -q /tmp/gradle.zip -d /opt
          echo "/opt/gradle-8.10.2/bin" >> "$GITHUB_PATH"
          /opt/gradle-8.10.2/bin/gradle --version

      - name: Install ktlint 1.8.0
        run: |
          curl -sSLo /tmp/ktlint \
            https://github.com/pinterest/ktlint/releases/download/1.8.0/ktlint
          chmod +x /tmp/ktlint
          sudo mv /tmp/ktlint /usr/local/bin/ktlint
          ktlint --version

      - name: Run ktlint
        run: make ktlint

      - name: Build debug APK
        # The Makefile defaults to `./gradlew` (`GRADLE ?= ./gradlew`); we
        # override it to use the system Gradle installed above so CI doesn't
        # need to materialise a wrapper jar.
        env:
          GRADLE: gradle
        run: make build

      - name: Upload debug APK
        # Only retained when this run is for a tag push. On branch pushes and
        # PRs the build artifacts are discarded when the runner is torn down.
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: ospchat-debug-${{ github.ref_name }}
          path: app/build/outputs/apk/debug/ospchat-*-debug.apk
          if-no-files-found: error
          retention-days: 90
